<div class="timeline-wrapper">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-top">
      <h1 class="page-title">Work Orders</h1>
    </div>
    <div class="toolbar-bottom">
      <div class="timescale-control">
        <div class="timescale-box"><span class="timescale-label">Timescale</span></div>
        <ng-select
          [items]="zoomOptions"
          bindValue="value"
          bindLabel="label"
          [clearable]="false"
          [searchable]="false"
          [ngModel]="zoomLevel()"
          (ngModelChange)="onZoomChange($event)"
          class="timescale-select"
          panelClass="timescale-panel"
        ></ng-select>
      </div>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid-container">

    <!-- Left fixed panel -->
    <div class="left-panel">
      <div class="left-header">Work Center</div>
      <div
        *ngFor="let wc of workCenters(); trackBy: trackByDocId"
        class="left-row"
        [class.hovered]="hoveredWorkCenterId === wc.docId"
        (mouseenter)="hoveredWorkCenterId = wc.docId"
        (mouseleave)="hoveredWorkCenterId = null"
      >
        <span class="wc-name">{{ wc.data.name }}</span>
      </div>
    </div>

    <!-- Scrollable timeline -->
    <div class="scroll-container" #scrollContainer>
      <div class="timeline-inner" [style.width.px]="totalTimelineWidth">

        <!-- Header -->
        <div class="timeline-header">
          <div
            *ngFor="let col of columns; trackBy: trackByDate"
            class="header-cell"
            [class.current-col]="isCurrentPeriod(col)"
            [style.width.px]="COLUMN_WIDTH"
          >
            <span class="current-badge" *ngIf="isCurrentPeriod(col)">
              Current {{ zoomLevel() === 'hour' ? 'hour'
                       : zoomLevel() === 'day'  ? 'day'
                       : zoomLevel() === 'week' ? 'week'
                       : 'month' }}
            </span>
            <span class="header-cell-label">{{ formatColumn(col) }}</span>
          </div>
        </div>

        <!-- Today vertical line -->
        <div class="today-line" [style.left.px]="todayLineLeft"></div>

        <!-- Work center rows -->
        <div
          *ngFor="let wc of workCenters(); trackBy: trackByDocId"
          class="timeline-row"
          [class.hovered]="hoveredWorkCenterId === wc.docId"
          [style.height.px]="ROW_HEIGHT"
          (mouseenter)="hoveredWorkCenterId = wc.docId"
          (mouseleave)="hoveredWorkCenterId = null"
          (click)="onTimelineClick($event, wc)"
        >
          <!-- Column backgrounds -->
          <div
            *ngFor="let col of columns; trackBy: trackByDate"
            class="row-cell"
            [style.width.px]="COLUMN_WIDTH"
          ></div>

          <!-- Hover hint (only when row is empty) -->
          <div class="add-hint" *ngIf="hoveredWorkCenterId === wc.docId && getBarsForCenter(wc.docId).length === 0">
            <span>Click to add dates</span>
          </div>

          <!-- Work order bars -->
          <div
            *ngFor="let bar of getBarsForCenter(wc.docId); trackBy: trackByBar"
            class="work-order-bar status-{{ bar.workOrder.data.status }}"
            [class.narrow]="bar.width < 180"
            [style.left.px]="bar.left"
            [style.width.px]="bar.width"
            [style.zIndex]="openDropdownId === bar.workOrder.docId ? 100 : 2"
            (click)="$event.stopPropagation()"
          >
            <span class="bar-name">{{ bar.workOrder.data.name }}</span>
            <span class="bar-badge">{{ getStatusLabel(bar.workOrder.data.status) }}</span>

            <!-- Three-dot menu -->
            <div class="actions-menu" (click)="toggleDropdown($event, bar.workOrder.docId)">
              <button
                class="actions-btn"
                [class.active]="openDropdownId === bar.workOrder.docId"
                aria-label="Actions"
              >···</button>
              <div class="dropdown-menu" [class.open]="openDropdownId === bar.workOrder.docId">
                <button class="dropdown-item" (click)="openEdit(bar.workOrder)">Edit</button>
                <button class="dropdown-item delete" (click)="deleteWorkOrder(bar.workOrder.docId)">Delete</button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <!-- Removed tooltip feature -->

</div>

<!-- Slide-out panel -->
<app-work-order-panel
  [isOpen]="isPanelOpen"
  [mode]="panelMode"
  [workOrder]="editingWorkOrder"
  [prefilledDate]="panelPrefilledDate"
  [workCenterId]="panelWorkCenterId"
  (closed)="closePanel()"
  (saved)="onSaved()"
></app-work-order-panel>
